<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tour Virtual</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      cursor: grab;
    }
    body:active { cursor: grabbing; }

    canvas { display: block; }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #fff;
      font-size: 14px;
      letter-spacing: 0.05em;
      z-index: 100;
      transition: opacity 0.3s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Breadcrumb ── */
    #breadcrumb {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
      pointer-events: none;
      z-index: 10;
    }

    /* ── Minimap ── */
    #minimap {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .map-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s, border-color 0.2s;
      letter-spacing: 0.05em;
    }
    .map-btn:hover { background: rgba(255,255,255,0.25); }
    .map-btn.active {
      background: rgba(255,255,255,0.9);
      color: #000;
      border-color: transparent;
    }
  );
}

// ─── Hotspots ─────────────────────────────────────────────────────────────────

    /* ── Dica ── */
    #hint {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 0.05em;
      pointer-events: none;
      animation: fadeOut 1s ease 3s forwards;
    }
    @keyframes fadeOut { to { opacity: 0; } }

    /* ══════════════════════════════════════════════════════════════════
       ── Pop-up de informação da obra ──────────────────────────────────
       ══════════════════════════════════════════════════════════════════ */

    /* Overlay escuro atrás do pop-up */
    #popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      backdrop-filter: blur(3px);
    }
    #popup-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Janela do pop-up */
    #info-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      width: min(420px, 92vw);
      background: #1a1a1e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      overflow: hidden;
      z-index: 201;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #info-popup.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    /* Imagem da obra */
    #popup-image {
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      display: block;
      background: #2a2a2e;  /* placeholder enquanto carrega */
    }

    /* Corpo do pop-up */
    .popup-body {
      padding: 20px 22px 24px;
    }

    /* Linha do título + botão fechar */
    .popup-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    #popup-title {
      font-size: 16px;
      font-weight: 600;
      color: #f0ede8;
      line-height: 1.35;
      letter-spacing: 0.01em;
    }

    /* Botão × */
    #popup-close {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      margin-top: 1px;
    }
    #popup-close:hover {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* Divisor sutil */
    .popup-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }

    /* Texto explicativo */
    #popup-text {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(255,255,255,0.65);
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Carregando cena...</span>
  </div>

  <!-- Nome da cena atual -->
  <div id="breadcrumb">—</div>

  <!-- Dica -->
  <div id="hint">🖱 Clique e arraste para olhar ao redor</div>

  <!-- Minimap -->
  <nav id="minimap"></nav>

  <!-- ── Pop-up de informação da obra ───────────────────────────────────── -->
  <div id="popup-overlay"></div>

  <div id="info-popup" role="dialog" aria-modal="true" aria-labelledby="popup-title">
    <!-- A imagem é injetada pelo script; exibida apenas se existir -->
    <img id="popup-image" src="" alt="Imagem da obra" />

    <div class="popup-body">
      <div class="popup-header">
        <h2 id="popup-title">Título da obra</h2>
        <button id="popup-close" aria-label="Fechar">&times;</button>
      </div>
      <div class="popup-divider"></div>
      <p id="popup-text">Descrição da obra.</p>
    </div>
  </div>

  <!-- ── Scripts ─────────────────────────────────────────────────────────── -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>

  <script type="module" src="./script.js"></script>

</body>
</html>
